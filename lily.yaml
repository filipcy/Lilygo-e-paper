substitutions:
  device: lilygo47
  name: "Lilygo 47"

esphome:
  name: ${device}
  friendly_name: ${name}

  on_boot:
    priority: -100
    then:
      - delay: 35s
      - script.execute: guarded_display_refresh

  platformio_options:
    upload_speed: 921600
    monitor_speed: 115200
    board_build.mcu: esp32s3
    board_build.f_cpu: 240000000L
    board_build.arduino.memory_type: qspi_opi
    board_build.flash_size: 16MB
    board_build.flash_mode: qio
    board_build.flash_type: qspi
    board_build.psram_type: opi
    board_build.memory_type: qspi_opi
    board_build.boot_freq: 80m
    build_flags:
      - "-DBOARD_HAS_PSRAM"
      - "-DARDUINO_USB_CDC_ON_BOOT=1"
      - "-mfix-esp32-psram-cache-issue"
    libraries:
      - SPI

esp32:
  variant: esp32s3
  board: esp32-s3-devkitc-1
  framework:
    type: arduino
    sdkconfig_options:
      CONFIG_SPIRAM: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_SPEED_80M: "y"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "16384"
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"
      CONFIG_ESP32S3_SPIRAM_SUPPORT: "y"
      CONFIG_SPIRAM_BOOT_INIT: "y"
      CONFIG_SPIRAM_IGNORE_NOTFOUND: "n"

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  manual_ip:
    static_ip: 192.168.20.244
    gateway: 192.168.20.1
    subnet: 255.255.255.0

  ap:
    ssid: "lilygo47-fallback"
    password: !secret lilygo_fallback_password

api:
  port: 6053
  reboot_timeout: 0s
  encryption:
    key: !secret lilygo_api_key

ota:
  - platform: esphome

captive_portal:

external_components:
  - source: github://hbast/esphome-lilygo-t547plus_esphome-2025.11
    components: ["t547"]

time:
  - platform: homeassistant
    id: homeassistant_time
    on_time:
      - seconds: 0
        minutes: 0
        then:
          - script.execute: guarded_display_refresh

globals:
  - id: display_refresh_lock
    type: bool
    restore_value: no
    initial_value: "false"

script:
  - id: guarded_display_refresh
    mode: single
    then:
      - if:
          condition:
            lambda: 'return !id(display_refresh_lock);'
          then:
            - logger.log: "Display refresh START"
            - lambda: 'id(display_refresh_lock) = true;'
            - component.update: t5_display
            - logger.log: "Display refresh END"
            - delay: 8s
            - lambda: 'id(display_refresh_lock) = false;'
            - logger.log: "Display refresh UNLOCK"

button:
  - platform: template
    name: "Refresh display"
    id: refresh_display_btn
    on_press:
      - script.execute: guarded_display_refresh

sensor:
