display:
  - platform: t547
    id: t5_display
    update_interval: never
    lambda: |-
      it.fill(Color::BLACK);

      auto now = id(homeassistant_time).now();

      auto is_valid_text = [](const std::string &s) -> bool {
        return !s.empty() && s != "unknown" && s != "unavailable" && s != "None";
      };

      auto normalize_alarm = [](std::string s) -> std::string {
        if (s.size() >= 16 && s[10] == 'T') return s.substr(11, 5);
        if (s.size() >= 5 && s.find(":") != std::string::npos) return s.substr(0, 5);
        return s;
      };

      auto climate_on = [&](const std::string &s) -> bool {
        return is_valid_text(s) && s != "off";
      };

      auto dow_pl = [&](int d) -> const char * {
        switch (d) {
          case 1: return "Niedziela";
          case 2: return "Poniedzialek";
          case 3: return "Wtorek";
          case 4: return "Sroda";
          case 5: return "Czwartek";
          case 6: return "Piatek";
          case 7: return "Sobota";
          default: return "";
        }
      };

      auto day_short_pl = [&](std::string s) -> const char * {
        if (s == "Mon") return "Pon";
        if (s == "Tue") return "Wt";
        if (s == "Wed") return "Sr";
        if (s == "Thu") return "Czw";
        if (s == "Fri") return "Pt";
        if (s == "Sat") return "Sob";
        if (s == "Sun") return "Nie";
        return "---";
      };

      auto cond_to_icon_daily = [&](std::string c) -> const char * {
        if (c == "sunny") return "\U000F0599";
        if (c == "clear-night") return "\U000F0594";
        if (c == "partlycloudy") return "\U000F0595";
        if (c == "cloudy") return "\U000F0590";
        if (c == "fog") return "\U000F0591";
        if (c == "rainy") return "\U000F0597";
        if (c == "pouring") return "\U000F054B";
        if (c == "snowy") return "\U000F0717";
        if (c == "snowy-rainy") return "\U000F0717";
        if (c == "lightning") return "\U000F067E";
        if (c == "lightning-rainy") return "\U000F067E";
        if (c == "hail") return "\U000F054B";
        if (c == "windy") return "\U000F0590";
        if (c == "windy-variant") return "\U000F0595";
        return "\U000F0590";
      };

      auto cond_to_icon_hourly = [&](std::string c) -> const char * {
        if (c == "sunny") return "\U000F0599";
        if (c == "clear-night") return "\U000F0594";
        if (c == "partlycloudy") return "\U000F0595";
        if (c == "cloudy") return "\U000F0590";
        if (c == "fog") return "\U000F0591";
        if (c == "rainy") return "\U000F0597";
        if (c == "pouring") return "\U000F054B";
        if (c == "snowy") return "\U000F0717";
        if (c == "snowy-rainy") return "\U000F0717";
        if (c == "lightning") return "\U000F067E";
        if (c == "lightning-rainy") return "\U000F067E";
        if (c == "hail") return "\U000F054B";
        if (c == "windy") return "\U000F0590";
        if (c == "windy-variant") return "\U000F0595";
        return "\U000F0590";
      };

      auto draw_stat_item = [&](int cx, int y, const char *icon, const char *label, const char *value) {
        it.print(cx, y, id(mdi_36), Color::WHITE, TextAlign::TOP_CENTER, icon);
        it.print(cx, y + 34, id(font_event_label), Color::WHITE, TextAlign::TOP_CENTER, label);
        it.print(cx, y + 58, id(font_event_value), Color::WHITE, TextAlign::TOP_CENTER, value);
      };

      const char *d1_icon = cond_to_icon_daily(id(owm_daily_1_condition).state);
      const char *d2_icon = cond_to_icon_daily(id(owm_daily_2_condition).state);
      const char *d3_icon = cond_to_icon_daily(id(owm_daily_3_condition).state);
      const char *d4_icon = cond_to_icon_daily(id(owm_daily_4_condition).state);

      const char *h1_icon = cond_to_icon_hourly(id(owm_hourly_1_condition).state);
      const char *h2_icon = cond_to_icon_hourly(id(owm_hourly_2_condition).state);
      const char *h3_icon = cond_to_icon_hourly(id(owm_hourly_3_condition).state);
      const char *h4_icon = cond_to_icon_hourly(id(owm_hourly_4_condition).state);

      char outside_buf[20];
      if (!isnan(id(temp_zewn).state)) {
        snprintf(outside_buf, sizeof(outside_buf), "%.1f°C", id(temp_zewn).state);
      } else {
        snprintf(outside_buf, sizeof(outside_buf), "--.-°C");
      }

      char inside_buf[20];
      if (!isnan(id(temp_wewn).state)) {
        snprintf(inside_buf, sizeof(inside_buf), "%.1f°C", id(temp_wewn).state);
      } else {
        snprintf(inside_buf, sizeof(inside_buf), "--.-°C");
      }

      char minmax_buf[24];
      if (!isnan(id(owm_daily_1_min).state) && !isnan(id(owm_daily_1_max).state)) {
        snprintf(minmax_buf, sizeof(minmax_buf), "min %.0f°   max %.0f°", id(owm_daily_1_min).state, id(owm_daily_1_max).state);
      } else {
        snprintf(minmax_buf, sizeof(minmax_buf), "min --°   max --°");
      }

      std::string sunrise = is_valid_text(id(next_rising_local).state) ? id(next_rising_local).state : "--:--";
      std::string sunset  = is_valid_text(id(next_setting_local).state) ? id(next_setting_local).state : "--:--";

      char d1_max[8]; char d1_min[8];
      char d2_max[8]; char d2_min[8];
      char d3_max[8]; char d3_min[8];
      char d4_max[8]; char d4_min[8];

      snprintf(d1_max, sizeof(d1_max), "%d°", isnan(id(owm_daily_1_max).state) ? 0 : (int) id(owm_daily_1_max).state);
      snprintf(d1_min, sizeof(d1_min), "%d°", isnan(id(owm_daily_1_min).state) ? 0 : (int) id(owm_daily_1_min).state);
      snprintf(d2_max, sizeof(d2_max), "%d°", isnan(id(owm_daily_2_max).state) ? 0 : (int) id(owm_daily_2_max).state);
      snprintf(d2_min, sizeof(d2_min), "%d°", isnan(id(owm_daily_2_min).state) ? 0 : (int) id(owm_daily_2_min).state);
      snprintf(d3_max, sizeof(d3_max), "%d°", isnan(id(owm_daily_3_max).state) ? 0 : (int) id(owm_daily_3_max).state);
      snprintf(d3_min, sizeof(d3_min), "%d°", isnan(id(owm_daily_3_min).state) ? 0 : (int) id(owm_daily_3_min).state);
      snprintf(d4_max, sizeof(d4_max), "%d°", isnan(id(owm_daily_4_max).state) ? 0 : (int) id(owm_daily_4_max).state);
      snprintf(d4_min, sizeof(d4_min), "%d°", isnan(id(owm_daily_4_min).state) ? 0 : (int) id(owm_daily_4_min).state);

      char h1_temp[8]; char h2_temp[8]; char h3_temp[8]; char h4_temp[8];
      snprintf(h1_temp, sizeof(h1_temp), "%d°", isnan(id(owm_hourly_1_temp).state) ? 0 : (int) id(owm_hourly_1_temp).state);
      snprintf(h2_temp, sizeof(h2_temp), "%d°", isnan(id(owm_hourly_2_temp).state) ? 0 : (int) id(owm_hourly_2_temp).state);
      snprintf(h3_temp, sizeof(h3_temp), "%d°", isnan(id(owm_hourly_3_temp).state) ? 0 : (int) id(owm_hourly_3_temp).state);
      snprintf(h4_temp, sizeof(h4_temp), "%d°", isnan(id(owm_hourly_4_temp).state) ? 0 : (int) id(owm_hourly_4_temp).state);

      std::string alarm = is_valid_text(id(budzik_raw).state) ? normalize_alarm(id(budzik_raw).state) : "--:--";

      char klima_buf[24];
      if (climate_on(id(klima_state).state) && !isnan(id(klima_target_temp).state)) {
        snprintf(klima_buf, sizeof(klima_buf), "%.0f°C", id(klima_target_temp).state);
      } else if (climate_on(id(klima_state).state)) {
        snprintf(klima_buf, sizeof(klima_buf), "ON");
      } else {
        snprintf(klima_buf, sizeof(klima_buf), "OFF");
      }

      char pralka_buf[24];
      if (!isnan(id(pralka_time_left).state) && id(pralka_time_left).state > 0) {
        int mins = (int) id(pralka_time_left).state;
        if (mins >= 60) {
          snprintf(pralka_buf, sizeof(pralka_buf), "%dh %02d", mins / 60, mins % 60);
        } else {
          snprintf(pralka_buf, sizeof(pralka_buf), "%d min", mins);
        }
      } else {
        snprintf(pralka_buf, sizeof(pralka_buf), "OFF");
      }

      char zmywarka_buf[24];
      if (!isnan(id(zmywarka_time_left).state) && id(zmywarka_time_left).state > 0) {
        int mins = (int) id(zmywarka_time_left).state;
        if (mins >= 60) {
          snprintf(zmywarka_buf, sizeof(zmywarka_buf), "%dh %02d", mins / 60, mins % 60);
        } else {
          snprintf(zmywarka_buf, sizeof(zmywarka_buf), "%d min", mins);
        }
      } else {
        snprintf(zmywarka_buf, sizeof(zmywarka_buf), "OFF");
      }

      char floor_buf[24];
      if (climate_on(id(podloga_state).state) && !isnan(id(podloga_target_temp).state)) {
        snprintf(floor_buf, sizeof(floor_buf), "%.0f°C", id(podloga_target_temp).state);
      } else if (climate_on(id(podloga_state).state)) {
        snprintf(floor_buf, sizeof(floor_buf), "ON");
      } else {
        snprintf(floor_buf, sizeof(floor_buf), "OFF");
      }

      std::string rain_text;
      if (!isnan(id(owm_rain_today).state) && id(owm_rain_today).state > 0.1f) {
        char rainbuf[52];
        snprintf(rainbuf, sizeof(rainbuf), "Opady dzis %.1f mm (%d%%)",
                 id(owm_rain_today).state,
                 (int) id(owm_rain_probability_today).state);
        rain_text = rainbuf;
      } else if (!isnan(id(owm_rain_probability_today).state)) {
        char rainbuf[40];
        snprintf(rainbuf, sizeof(rainbuf), "Szansa deszczu %d%%",
                 (int) id(owm_rain_probability_today).state);
        rain_text = rainbuf;
      } else {
        rain_text = "Brak danych o opadach";
      }

      char carbuf[28];
      if (!isnan(id(car_range).state)) {
        snprintf(carbuf, sizeof(carbuf), "Zasieg %.0f km", id(car_range).state);
      } else {
        snprintf(carbuf, sizeof(carbuf), "Zasieg -- km");
      }

      // Ramka zewnetrzna
      it.rectangle(8, 8, 944, 524, Color::WHITE);

      // Header
      if (now.is_valid()) {
        it.strftime(28, 20, id(font_header_date), Color::WHITE, TextAlign::TOP_LEFT, "%d.%m", now);
        it.print(150, 24, id(font_header_meta), Color::WHITE, dow_pl(now.day_of_week));

        char updated_buf[24];
        snprintf(updated_buf, sizeof(updated_buf), "Odswiezono %02d:%02d", now.hour, now.minute);
        it.print(918, 26, id(font_header_meta), Color::WHITE, TextAlign::TOP_RIGHT, updated_buf);
      } else {
        it.print(28, 20, id(font_header_date), Color::WHITE, "Brak czasu");
      }

      it.line(24, 70, 928, 70, Color::WHITE);

      // Sekcje glowne
      it.print(38, 88, id(font_section), Color::WHITE, "Na zewnatrz");
      it.print(520, 88, id(font_section), Color::WHITE, "W mieszkaniu");

      it.line(472, 92, 472, 320, Color::WHITE);

      // Lewa gora - outdoor
      it.print(34, 126, id(mdi_48), Color::WHITE, "\U000F02DC");
      it.print(96, 118, id(font_temp_main), Color::WHITE, outside_buf);
      it.print(100, 194, id(font_temp_sub), Color::WHITE, minmax_buf);

      // Prawa gora - indoor
      it.print(520, 126, id(mdi_48), Color::WHITE, "\U000F1C63");
      it.print(584, 122, id(font_temp_inside), Color::WHITE, inside_buf);

      // Wschod / zachod
      it.print(528, 204, id(mdi_36), Color::WHITE, "\U000F0599");
